<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Friend Schedule</title>

<style>

body{
    font-family: Arial;
    text-align:center;
}

table{
    border-collapse: collapse;
    margin:auto;
}

td,th{
    border:1px solid black;
    padding:10px;
    width:80px;
}

.free{
    background-color:lightgreen;
}

.busy{
    background-color:#ff6b6b;
}

.maybe{
    background-color:khaki;
}

</style>

</head>

<body>

<h1>Friend Meeting Schedule</h1>

<input id="nameInput" placeholder="Enter your name">
<button onclick="addUser()">Add</button>

<br><br>

<table id="schedule">

<tr>
<th>Name</th>
<th>Mon</th>
<th>Tue</th>
<th>Wed</th>
<th>Thu</th>
<th>Fri</th>
</tr>

</table>

<script>

function addUser(){

    let name = document.getElementById("nameInput").value
    let table = document.getElementById("schedule")

    let row = table.insertRow()

    let nameCell = row.insertCell()
    nameCell.innerHTML = name

    for(let i=0;i<5;i++){

        let cell = row.insertCell()

        cell.onclick=function(){

            if(cell.className=="free"){
                cell.className="busy"
            }
            else if(cell.className=="busy"){
                cell.className="maybe"
            }
            else{
                cell.className="free"
            }

        }

    }

}

</script>

</body>
</html>
