<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>April Meeting Schedule</title>

<style>

body{
font-family: Arial;
text-align:center;
}

table{
border-collapse: collapse;
margin:auto;
}

th,td{
border:1px solid black;
padding:8px;
width:70px;
height:35px;
font-size:12px;
}

.free{
background-color:lightgreen;
}

.busy{
background-color:#ff6b6b;
}

.maybe{
background-color:khaki;
}

</style>

</head>

<body>

<h1>Meeting Schedule (April)</h1>

<input id="nameInput" placeholder="Enter name">
<button onclick="addUser()">Add</button>

<br><br>

<table id="schedule">

<tr id="header">
<th>Name</th>
</tr>

</table>

<script>

// สร้างวันที่ 1-30 เมษายน
const days = []

for(let i=1;i<=30;i++){
days.push("Apr "+i)
}

// สร้างหัวตาราง
let header=document.getElementById("header")

days.forEach(day=>{
let th=document.createElement("th")
th.innerText=day
header.appendChild(th)
})

function addUser(){

let name=document.getElementById("nameInput").value

if(name=="") return

let table=document.getElementById("schedule")

let row=table.insertRow()

let nameCell=row.insertCell()

nameCell.innerText=name

for(let i=0;i<days.length;i++){

let cell=row.insertCell()

cell.onclick=function(){

if(cell.className=="free"){

cell.className="busy"
cell.innerText="ไม่ว่าง"

}
else if(cell.className=="busy"){

cell.className="maybe"
cell.innerText="ไม่แน่ใจ"

}
else{

cell.className="free"
cell.innerText="ว่าง"

}

}

}

}

</script>

</body>
</html>
